services:
  warehouse-management:
    build: .
    image: warehouse-management-system:v1.0
    container_name: warehouse-management-system
    ports:
      - "8000:8000"
    volumes:
      - warehouse-data:/app/data
    environment:
      DATA_DIR: /app/data
      STATIC_DIR: /app/static
      CORS_ORIGINS: "*"
    restart: unless-stopped

volumes:
  warehouse-data:
